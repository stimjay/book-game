<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Лукоморье — выбери правильно</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-touch-callout: none; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(180deg, #0a0a1a, #1a1a3a); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 10px; }
        .game-container { background: linear-gradient(180deg, #2a1a0f, #4a2a1a); padding: 20px; border-radius: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.8); width: 100%; max-width: 800px; border: 3px solid #8b6b4a; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 5px; }
        .title { color: #f1c40f; font-size: 22px; font-family: 'Comic Sans MS', cursive; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .title .bounce { display: inline-block; animation: bounce 2s ease-in-out infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        .qr-btn { background: #2980b9; border: none; color: white; padding: 6px 16px; border-radius: 30px; font-size: 13px; font-weight: 600; cursor: pointer; box-shadow: 0 3px 0 #1a5276; transition: all 0.15s; }
        .qr-btn:active { transform: translateY(3px); box-shadow: 0 0px 0 #1a5276; }
        .qr-btn:hover { background: #3498db; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; color: white; font-size: 12px; background: rgba(0,0,0,0.6); padding: 8px 12px; border-radius: 12px; margin-bottom: 10px; border: 2px solid #8b6b4a; text-align: center; }
        .stats .label { font-size: 9px; color: #aaa; display: block; }
        .stats .value { font-size: 18px; font-weight: bold; color: #f1c40f; display: block; }
        .stats .value.found { color: #5dade2; }
        .stats .value.attempts { color: #e67e22; }
        .stats .value.status { color: #2ecc71; font-size: 14px; }

        /* Сцена с фоном */
        .scene { background: linear-gradient(180deg, #1a2a5a 0%, #2a5a3a 50%, #1a3a2a 100%); padding: 15px; border-radius: 20px; position: relative; height: 480px; overflow: hidden; border: 4px solid #3d2b1f; box-shadow: inset 0 0 50px rgba(0,0,0,0.3); }
        .scene-content { position: relative; width: 100%; height: 100%; border-radius: 12px; overflow: hidden; }
        .sky { position: absolute; top: 0; left: 0; width: 100%; height: 55%; background: linear-gradient(180deg, #0a0a3a, #1a1a5a, #1a2a6a); z-index: 1; }
        .stars { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: radial-gradient(2px 2px at 10% 20%, #fff, transparent), radial-gradient(2px 2px at 30% 40%, #fff, transparent), radial-gradient(2px 2px at 50% 10%, #fff, transparent), radial-gradient(2px 2px at 70% 30%, #fff, transparent), radial-gradient(2px 2px at 90% 50%, #fff, transparent), radial-gradient(2px 2px at 20% 60%, #fff, transparent), radial-gradient(2px 2px at 60% 70%, #fff, transparent), radial-gradient(2px 2px at 80% 80%, #fff, transparent), radial-gradient(2px 2px at 40% 90%, #fff, transparent); background-size: 100% 100%; background-repeat: no-repeat; animation: twinkle 3s ease-in-out infinite alternate; }
        @keyframes twinkle { 0% { opacity: 0.5; } 100% { opacity: 1; } }
        .moon { position: absolute; top: 15px; right: 30px; font-size: 40px; z-index: 2; animation: moonGlow 3s ease-in-out infinite alternate; }
        @keyframes moonGlow { 0% { filter: drop-shadow(0 0 10px rgba(255,255,200,0.3)); } 100% { filter: drop-shadow(0 0 30px rgba(255,255,200,0.6)); } }
        .ground { position: absolute; bottom: 0; left: 0; width: 100%; height: 45%; background: linear-gradient(180deg, #2a5a3a, #1a3a2a, #0a2a1a); z-index: 1; }

        /* Фоновый дуб и надпись */
        .background-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Comic Sans MS', cursive;
            color: rgba(255,255,255,0.15);
            font-size: 28px;
            text-align: center;
            line-height: 1.4;
            z-index: 2;
            pointer-events: none;
            text-shadow: 0 0 20px rgba(0,0,0,0.5);
            width: 80%;
        }
        .background-text .oak {
            font-size: 80px;
            display: block;
            margin-bottom: 5px;
            color: rgba(255,255,255,0.2);
        }
        .background-text .line {
            display: block;
            font-size: 22px;
            letter-spacing: 4px;
            font-weight: bold;
            color: rgba(255,255,255,0.12);
        }

        /* Задания — две карточки для выбора */
        .task-area {
            position: absolute;
            bottom: 10%;
            left: 10%;
            width: 80%;
            z-index: 5;
            display: flex;
            justify-content: space-around;
            align-items: center;
            gap: 20px;
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 15px 10px;
            backdrop-filter: blur(4px);
            border: 2px solid rgba(255,215,0,0.3);
            flex-wrap: wrap;
        }
        .task-card {
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 12px 20px;
            cursor: pointer;
            transition: all 0.2s;
            border: 3px solid transparent;
            min-width: 100px;
            text-align: center;
            touch-action: manipulation;
        }
        .task-card:active { transform: scale(0.92); }
        .task-card .emoji { font-size: 60px; display: block; line-height: 1.2; }
        .task-card .label { font-size: 14px; color: #ddd; margin-top: 6px; font-weight: bold; text-shadow: 0 1px 4px rgba(0,0,0,0.5); }
        .task-card.selected { border-color: #f1c40f; background: rgba(241,196,15,0.15); }
        .task-card.correct { border-color: #2ecc71; background: rgba(46,204,113,0.2); }
        .task-card.wrong { border-color: #e74c3c; background: rgba(231,76,60,0.2); animation: shake 0.4s ease-out; }
        .task-card.disabled { pointer-events: none; opacity: 0.5; }

        .task-counter {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            color: #f1c40f;
            font-size: 16px;
            font-weight: bold;
            background: rgba(0,0,0,0.5);
            padding: 4px 18px;
            border-radius: 30px;
            border: 1px solid #f1c40f;
            pointer-events: none;
        }

        .controls { display: flex; justify-content: center; gap: 15px; margin-top: 12px; flex-wrap: wrap; }
        .btn { background: linear-gradient(180deg, #4a3a2a, #2a1a0f); border: none; color: white; padding: 12px 25px; border-radius: 12px; font-size: 18px; cursor: pointer; box-shadow: 0 4px 0 #1a0a05; min-width: 60px; font-weight: bold; border: 1px solid #6a4a3a; transition: all 0.08s; touch-action: manipulation; }
        .btn:active { transform: translateY(4px); box-shadow: 0 0px 0 #1a0a05; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn.start { background: linear-gradient(180deg, #27ae60, #1e8449); box-shadow: 0 4px 0 #145a32; font-size: 18px; min-width: 120px; }
        .btn.start:disabled { background: #555; box-shadow: 0 4px 0 #222; }

        .result { text-align: center; margin-top: 10px; font-size: 14px; color: #f1c40f; background: rgba(0,0,0,0.6); padding: 8px 12px; border-radius: 12px; border: 1px solid #8b6b4a; min-height: 45px; display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 8px; }
        .pink-square { background: #e91e63; color: white; padding: 4px 14px; border-radius: 6px; font-size: 24px; font-weight: 700; box-shadow: 0 3px 0 #880e4f; min-width: 40px; text-align: center; display: none; transition: all 0.3s; }
        .pink-square.show { display: inline-block; animation: squareAppear 0.5s ease-out; }
        @keyframes squareAppear { 0% { transform: scale(0) rotate(-180deg); opacity: 0; } 100% { transform: scale(1) rotate(0deg); opacity: 1; } }
        .restart-btn { background: #e67e22; border: none; color: white; padding: 5px 18px; border-radius: 30px; font-size: 13px; font-weight: 700; cursor: pointer; box-shadow: 0 3px 0 #d35400; transition: all 0.2s; }
        .restart-btn:active { transform: translateY(3px); box-shadow: 0 0px 0 #d35400; }
        .restart-btn:hover { background: #f39c12; }
        .hint-text { font-size: 12px; color: rgba(255,255,255,0.5); text-align: center; margin-top: 8px; font-style: italic; }

        /* QR modal */
        .qr-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center; }
        .qr-modal.active { display: flex; }
        .qr-modal-content { background: white; padding: 25px 30px 30px; border-radius: 25px; text-align: center; max-width: 400px; width: 92%; box-shadow: 0 20px 60px rgba(0,0,0,0.6); max-height: 92vh; overflow-y: auto; }
        .qr-modal-content h2 { color: #2d2117; font-size: 20px; margin-bottom: 5px; }
        .qr-modal-content .subtitle { color: #666; margin-bottom: 12px; font-size: 13px; }
        #qrcode { display: inline-block; background: white; padding: 12px; border-radius: 10px; margin: 5px auto; border: 2px solid #ddd; }
        .qr-url-box { background: #f5f5f5; padding: 8px 10px; border-radius: 8px; margin: 10px 0; word-break: break-all; font-size: 12px; color: #555; border: 1px solid #ddd; text-align: left; font-family: monospace; max-height: 50px; overflow-y: auto; }
        .qr-url-label { font-size: 12px; color: #888; text-align: left; margin-bottom: 3px; }
        .qr-input-group { display: flex; gap: 6px; margin: 8px 0; }
        .qr-input-group input { flex: 1; padding: 8px 12px; border-radius: 8px; border: 2px solid #ddd; font-size: 12px; font-family: monospace; }
        .qr-input-group input:focus { border-color: #2980b9; outline: none; }
        .qr-input-group button { background: #27ae60; border: none; color: white; padding: 8px 16px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; }
        .qr-input-group button:hover { background: #2ecc71; }
        .qr-close-btn { background: #e74c3c; border: none; color: white; padding: 10px 30px; border-radius: 30px; font-size: 16px; font-weight: 600; cursor: pointer; box-shadow: 0 3px 0 #c0392b; margin-top: 8px; width: 100%; }
        .qr-close-btn:active { transform: translateY(3px); box-shadow: 0 0px 0 #c0392b; }
        .qr-close-btn:hover { background: #c0392b; }
        .qr-help { font-size: 12px; color: #999; margin-top: 6px; padding: 8px; background: #f8f8f8; border-radius: 8px; border-left: 3px solid #f39c12; text-align: left; }

        @media (max-width: 600px) {
            .scene { height: 420px; padding: 10px; }
            .task-area { padding: 12px 8px; gap: 10px; bottom: 8%; }
            .task-card { min-width: 70px; padding: 8px 12px; }
            .task-card .emoji { font-size: 40px; }
            .task-card .label { font-size: 11px; }
            .background-text { font-size: 20px; }
            .background-text .oak { font-size: 60px; }
            .background-text .line { font-size: 16px; }
            .title { font-size: 18px; }
            .stats .value { font-size: 15px; }
            .btn { padding: 8px 16px; font-size: 15px; min-width: 45px; }
            .btn.start { font-size: 15px; min-width: 90px; }
        }
        @media (max-width: 400px) {
            .scene { height: 380px; padding: 8px; }
            .task-card .emoji { font-size: 32px; }
            .task-card .label { font-size: 10px; }
            .background-text { font-size: 16px; }
            .background-text .oak { font-size: 45px; }
            .background-text .line { font-size: 13px; }
            .task-area { padding: 8px 5px; gap: 6px; bottom: 6%; }
            .task-card { min-width: 55px; padding: 5px 8px; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="header">
        <div class="title"><span class="bounce">🌳</span> Лукоморье <span class="bounce">📖</span></div>
        <button class="qr-btn" id="qrBtn">📱 QR</button>
    </div>

    <div class="stats">
        <div><span class="label">✅ Выполнено</span><span class="value found" id="foundCount">0/7</span></div>
        <div><span class="label">❤️ Попытки</span><span class="value attempts" id="attemptDisplay">3</span></div>
        <div><span class="label">🏆 Статус</span><span class="value status" id="statusDisplay">Готов</span></div>
    </div>

    <div class="scene" id="scene">
        <div class="scene-content">
            <!-- Фон -->
            <div class="sky"><div class="stars"></div><div class="moon">🌙</div></div>
            <div class="ground"></div>

            <!-- Фоновый дуб и надпись -->
            <div class="background-text">
                <span class="oak">🌳</span>
                <span class="line">У ЛУКОМОРЬЯ</span>
                <span class="line" style="font-size:0.9em; color:rgba(255,255,255,0.1);">ДУБ ЗЕЛЕНЫЙ</span>
            </div>

            <!-- Счётчик заданий -->
            <div class="task-counter" id="taskCounter">1 / 7</div>

            <!-- Область заданий (две карточки) -->
            <div class="task-area" id="taskArea">
                <!-- Карточки создаются скриптом -->
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn" id="resetBtn">🔄 Заново</button>
        <button class="btn start" id="startBtn">⚡ Начать</button>
    </div>

    <div class="result">
        <span id="message">Нажмите «Начать»</span>
        <span class="pink-square" id="pinkSquare">1</span>
    </div>
    <div class="hint-text" id="hintText">Выберите вариант из стихотворения Пушкина</div>
</div>

<!-- QR modal -->
<div class="qr-modal" id="qrModal">
    <div class="qr-modal-content">
        <h2>📱 QR-код</h2>
        <p class="subtitle">Отсканируйте для перехода на игру</p>
        <div id="qrcode"></div>
        <div class="qr-url-label">🔗 Ссылка:</div>
        <div class="qr-url-box" id="qrUrl">Загрузка...</div>
        <div class="qr-input-group">
            <input type="text" id="qrUrlInput" placeholder="Вставьте ссылку...">
            <button id="qrUpdateBtn">Обновить</button>
        </div>
        <div class="qr-help">💡 Загрузите на хостинг и вставьте ссылку</div>
        <button class="qr-close-btn" id="qrCloseBtn">✕ Закрыть</button>
    </div>
</div>

<script>
(function() {
    // === ДАННЫЕ ЗАДАНИЙ (7 штук, в порядке стихотворения) ===
    const tasks = [
        {
            question: 'Что висит на дубе?',
            correct: { emoji: '⛓️', label: 'Златая цепь' },
            wrong: { emoji: '🔗', label: 'Серебряная цепь' }
        },
        {
            question: 'Кто ходит по цепи?',
            correct: { emoji: '🐱', label: 'Кот учёный' },
            wrong: { emoji: '🦫', label: 'Капибара' }
        },
        {
            question: 'Кто бродит по Лукоморью?',
            correct: { emoji: '🧝', label: 'Леший' },
            wrong: { emoji: '🧞', label: 'Алладин' }
        },
        {
            question: 'Кто сидит на ветвях?',
            correct: { emoji: '🧜‍♀️', label: 'Русалка' },
            wrong: { emoji: '🐿️', label: 'Белка' }
        },
        {
            question: 'Какие следы на дорожках?',
            correct: { emoji: '🐾', label: 'Невиданных зверей' },
            wrong: { emoji: '🐾', label: 'Диких зверей' }
        },
        {
            question: 'Какая избушка у Лукоморья?',
            correct: { emoji: '🏚️', label: 'Без окон, без дверей' },
            wrong: { emoji: '🏠', label: 'Со стеклопакетами' }
        },
        {
            question: 'Кто выходит из вод с витязями?',
            correct: { emoji: '🧓', label: 'Дядька их морской' },
            wrong: { emoji: '👨', label: 'Братец их морской' }
        }
    ];

    // === ЭЛЕМЕНТЫ DOM ===
    const taskArea = document.getElementById('taskArea');
    const taskCounter = document.getElementById('taskCounter');
    const foundSpan = document.getElementById('foundCount');
    const attemptsSpan = document.getElementById('attemptDisplay');
    const statusSpan = document.getElementById('statusDisplay');
    const msg = document.getElementById('message');
    const pinkSquare = document.getElementById('pinkSquare');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');
    const hint = document.getElementById('hintText');

    // === ПЕРЕМЕННЫЕ СОСТОЯНИЯ ===
    let currentTaskIndex = 0;
    let found = 0;
    let attempts = 3;
    const MAX_ATTEMPTS = 3;
    let gameActive = false;
    let gameOver = false;
    let gameWon = false;
    let blockClicks = false;

    function updateUI() {
        foundSpan.textContent = found + '/' + tasks.length;
        attemptsSpan.textContent = attempts;
        if (gameWon) {
            statusSpan.textContent = '🏆 Победа!';
            statusSpan.style.color = '#f1c40f';
        } else if (gameOver) {
            statusSpan.textContent = '💀 Поражение';
            statusSpan.style.color = '#e74c3c';
        } else if (gameActive) {
            statusSpan.textContent = '🔍 Ищем...';
            statusSpan.style.color = '#2ecc71';
        } else {
            statusSpan.textContent = 'Готов';
            statusSpan.style.color = '#3498db';
        }
        taskCounter.textContent = (currentTaskIndex + 1) + ' / ' + tasks.length;
    }

    function setMessage(text, isGood = false) {
        msg.textContent = text;
        msg.style.color = isGood ? '#2ecc71' : '#f1c40f';
    }

    function renderTask() {
        if (currentTaskIndex >= tasks.length) return;
        const task = tasks[currentTaskIndex];
        taskArea.innerHTML = '';
        // Создаём две карточки
        const cards = [
            { data: task.correct, isCorrect: true },
            { data: task.wrong, isCorrect: false }
        ];
        // Перемешиваем порядок
        cards.sort(() => Math.random() - 0.5);
        cards.forEach(item => {
            const card = document.createElement('div');
            card.className = 'task-card';
            card.innerHTML = `
                <span class="emoji">${item.data.emoji}</span>
                <span class="label">${item.data.label}</span>
            `;
            card.dataset.correct = item.isCorrect ? 'true' : 'false';
            card.addEventListener('click', () => handleCardClick(card));
            card.addEventListener('touchstart', (e) => {
                e.preventDefault();
                handleCardClick(card);
            }, { passive: false });
            taskArea.appendChild(card);
        });
        hint.textContent = '🔍 ' + task.question;
        updateUI();
    }

    function handleCardClick(card) {
        if (!gameActive || gameOver || gameWon || blockClicks) return;
        if (card.classList.contains('disabled')) return;

        const isCorrect = card.dataset.correct === 'true';
        blockClicks = true;

        if (isCorrect) {
            card.classList.add('correct');
            found++;
            currentTaskIndex++;
            updateUI();
            setMessage('✅ Верно!', true);
            document.querySelectorAll('.task-card').forEach(el => el.classList.add('disabled'));
            setTimeout(() => {
                blockClicks = false;
                if (found === tasks.length) {
                    gameWon = true;
                    gameActive = false;
                    pinkSquare.classList.add('show');
                    setMessage('🎉 Поздравляем! Все задания выполнены!', true);
                    statusSpan.textContent = '🏆 Победа!';
                    statusSpan.style.color = '#f1c40f';
                    startBtn.disabled = false;
                    taskArea.innerHTML = '<div style="color:#f1c40f; font-size:22px; text-align:center; width:100%; padding:20px;">🌟 Ты знаешь Лукоморье! 🌟</div>';
                    taskCounter.textContent = '✅ Готово!';
                } else {
                    renderTask();
                }
            }, 800);
        } else {
            card.classList.add('wrong');
            attempts--;
            attemptsSpan.textContent = attempts;
            setMessage('❌ Неправильно! Осталось попыток: ' + attempts, false);
            document.querySelectorAll('.task-card').forEach(el => el.classList.add('disabled'));
            setTimeout(() => {
                if (attempts <= 0) {
                    gameOver = true;
                    gameActive = false;
                    statusSpan.textContent = '💀 Поражение';
                    statusSpan.style.color = '#e74c3c';
                    setMessage('😢 Попытки закончились! Начните заново.', false);
                    startBtn.disabled = false;
                    taskArea.innerHTML = '<div style="color:#e74c3c; font-size:20px; text-align:center; width:100%; padding:20px;">💔 Попытки исчерпаны</div>';
                    taskCounter.textContent = '❌ Конец';
                    blockClicks = false;
                } else {
                    document.querySelectorAll('.task-card').forEach(el => {
                        el.classList.remove('wrong', 'disabled');
                    });
                    blockClicks = false;
                    renderTask();
                }
                updateUI();
            }, 700);
        }
    }

    function resetGame() {
        currentTaskIndex = 0;
        found = 0;
        attempts = MAX_ATTEMPTS;
        gameActive = false;
        gameOver = false;
        gameWon = false;
        blockClicks = false;
        pinkSquare.classList.remove('show');
        taskArea.innerHTML = '';
        updateUI();
        setMessage('Нажмите «Начать»');
        startBtn.disabled = false;
        hint.textContent = 'Выберите вариант из стихотворения Пушкина';
        taskCounter.textContent = '1 / ' + tasks.length;
    }

    function startGame() {
        resetGame(); // чистим всё
        currentTaskIndex = 0;
        found = 0;
        attempts = MAX_ATTEMPTS;
        gameActive = true;
        gameOver = false;
        gameWon = false;
        blockClicks = false;
        pinkSquare.classList.remove('show');
        startBtn.disabled = true;
        updateUI();
        setMessage('🔍 Выберите правильный вариант!', true);
        renderTask();
    }

    // === ОБРАБОТЧИКИ ===
    startBtn.addEventListener('click', startGame);
    resetBtn.addEventListener('click', function() {
        resetGame();
        startBtn.disabled = false;
    });

    // Инициализация
    resetGame();

    // === QR КОД ===
    const qrBtn = document.getElementById('qrBtn');
    const qrModal = document.getElementById('qrModal');
    const qrCloseBtn = document.getElementById('qrCloseBtn');
    const qrUrl = document.getElementById('qrUrl');
    const qrUrlInput = document.getElementById('qrUrlInput');
    const qrUpdateBtn = document.getElementById('qrUpdateBtn');
    const qrcodeContainer = document.getElementById('qrcode');

    function generateQR(text) {
        qrcodeContainer.innerHTML = '';
        if (text && text.trim() !== '') {
            try {
                new QRCode(qrcodeContainer, { text: text, width: 200, height: 200, colorDark: '#000000', colorLight: '#ffffff', correctLevel: QRCode.CorrectLevel.H });
                return true;
            } catch(e) { return false; }
        }
        return false;
    }

    function getCurrentUrl() {
        let url = window.location.href;
        if (url.startsWith('file://')) return '';
        return url;
    }

    qrBtn.addEventListener('click', function() {
        qrModal.classList.add('active');
        let currentUrl = getCurrentUrl();
        if (currentUrl) {
            qrUrl.textContent = currentUrl;
            qrUrlInput.value = currentUrl;
            generateQR(currentUrl);
        } else {
            qrUrl.textContent = '⚠️ Загрузите на хостинг!';
            qrUrlInput.value = '';
            qrcodeContainer.innerHTML = '<div style="padding:20px;color:#999;">Введите ссылку</div>';
        }
    });

    qrCloseBtn.addEventListener('click', function() { qrModal.classList.remove('active'); });
    qrModal.addEventListener('click', function(e) { if (e.target === qrModal) qrModal.classList.remove('active'); });
    qrUpdateBtn.addEventListener('click', function() {
        let url = qrUrlInput.value.trim();
        if (url) {
            qrUrl.textContent = url;
            if (!generateQR(url)) alert('Не удалось создать QR-код');
        } else {
            alert('Введите ссылку');
        }
    });
    qrUrlInput.addEventListener('keypress', function(e) { if (e.key === 'Enter') qrUpdateBtn.click(); });
})();
</script>
</body>
</html>
