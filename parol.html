<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Опасность уничтожения системы!</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0000;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            color: #ff3333;
            overflow: hidden;
        }

        .game-wrapper {
            background: #1a0000;
            border: 3px solid #ff3333;
            border-radius: 30px;
            padding: 30px 25px;
            max-width: 650px;
            width: 100%;
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.3), inset 0 0 40px rgba(255, 0, 0, 0.1);
            position: relative;
            animation: borderPulse 1.5s infinite alternate;
        }

        @keyframes borderPulse {
            0% { border-color: #ff3333; box-shadow: 0 0 30px rgba(255, 0, 0, 0.3); }
            100% { border-color: #ff6666; box-shadow: 0 0 60px rgba(255, 0, 0, 0.6); }
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .title {
            font-size: 28px;
            font-weight: bold;
            color: #ff3333;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
            letter-spacing: 3px;
            animation: glitch 0.8s infinite alternate;
        }

        @keyframes glitch {
            0% { text-shadow: 2px 0 #ff0000, -2px 0 #00ff00; }
            25% { text-shadow: -2px 0 #ff0000, 2px 0 #00ff00; }
            50% { text-shadow: 2px 2px #ff0000, -2px -2px #00ff00; }
            75% { text-shadow: -2px 2px #ff0000, 2px -2px #00ff00; }
            100% { text-shadow: 2px 0 #ff0000, -2px 0 #00ff00; }
        }

        .qr-btn {
            background: #222;
            border: 2px solid #ff3333;
            color: #ff3333;
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            touch-action: manipulation;
            font-family: inherit;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.2);
        }

        .qr-btn:active {
            transform: scale(0.95);
        }

        .qr-btn:hover {
            background: #ff3333;
            color: #0a0000;
        }

        .danger-header {
            text-align: center;
            font-size: 32px;
            font-weight: 900;
            color: #ff0000;
            text-shadow: 0 0 30px rgba(255, 0, 0, 0.7), 0 0 60px rgba(255, 0, 0, 0.4);
            animation: blink 0.6s infinite alternate;
            margin-bottom: 15px;
            letter-spacing: 2px;
            word-break: break-word;
        }

        @keyframes blink {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        .timer-container {
            text-align: center;
            font-size: 72px;
            font-weight: bold;
            color: #ff4444;
            text-shadow: 0 0 40px rgba(255, 0, 0, 0.5);
            margin: 10px 0 20px;
            letter-spacing: 5px;
            font-variant-numeric: tabular-nums;
        }

        .timer-container .label {
            font-size: 20px;
            color: #cc4444;
            text-shadow: none;
            display: block;
            margin-bottom: 5px;
            letter-spacing: 3px;
        }

        .timer-container .seconds {
            display: inline-block;
            min-width: 120px;
            background: rgba(255, 0, 0, 0.05);
            padding: 5px 15px;
            border-radius: 12px;
            border: 1px solid #ff3333;
        }

        .input-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin: 20px 0;
        }

        .input-area label {
            font-size: 18px;
            color: #ff6666;
            letter-spacing: 2px;
        }

        .input-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
        }

        .input-row input {
            flex: 1;
            min-width: 200px;
            padding: 14px 20px;
            font-size: 22px;
            font-family: 'Courier New', monospace;
            background: #0a0000;
            border: 2px solid #ff3333;
            border-radius: 14px;
            color: #ff6666;
            text-align: center;
            outline: none;
            transition: 0.2s;
            letter-spacing: 4px;
        }

        .input-row input:focus {
            border-color: #ff6666;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.3);
        }

        .input-row input::placeholder {
            color: #441111;
            letter-spacing: 1px;
            font-size: 16px;
        }

        .input-row button {
            padding: 14px 30px;
            font-size: 20px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            background: #ff3333;
            color: #0a0000;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.3);
            touch-action: manipulation;
            white-space: nowrap;
        }

        .input-row button:active {
            transform: scale(0.95);
        }

        .input-row button:hover {
            background: #ff5555;
        }

        .input-row button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .message-box {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            min-height: 70px;
            padding: 12px;
            border-radius: 16px;
            background: rgba(255, 0, 0, 0.05);
            border: 1px dashed #ff4444;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
            transition: 0.3s;
        }

        .message-box.success {
            border-color: #00ff66;
            color: #00ff66;
            background: rgba(0, 255, 100, 0.05);
            text-shadow: 0 0 20px rgba(0, 255, 100, 0.3);
        }

        .message-box.fail {
            border-color: #ff0000;
            color: #ff0000;
            background: rgba(255, 0, 0, 0.1);
        }

        .restart-btn {
            background: transparent;
            border: 2px solid #ff3333;
            color: #ff3333;
            padding: 10px 28px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            margin-top: 10px;
            touch-action: manipulation;
        }

        .restart-btn:hover {
            background: #ff3333;
            color: #0a0000;
        }

        .restart-btn:active {
            transform: scale(0.95);
        }

        .qr-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .qr-modal.active { display: flex; }
        .qr-modal-content {
            background: #1a1a1a;
            padding: 25px 30px 30px;
            border-radius: 25px;
            text-align: center;
            max-width: 400px;
            width: 92%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            border: 2px solid #ff3333;
        }
        .qr-modal-content h2 { color: #ff3333; font-size: 22px; margin-bottom: 5px; font-family: 'Courier New', monospace; }
        .qr-modal-content .subtitle { color: #cc6666; margin-bottom: 12px; font-size: 14px; }
        #qrcode { display: inline-block; background: white; padding: 12px; border-radius: 10px; margin: 5px auto; border: 2px solid #333; }
        .qr-url-box {
            background: #111;
            padding: 8px 10px;
            border-radius: 8px;
            margin: 10px 0;
            word-break: break-all;
            font-size: 12px;
            color: #888;
            border: 1px solid #333;
            text-align: left;
            font-family: monospace;
            max-height: 50px;
            overflow-y: auto;
        }
        .qr-url-label { font-size: 12px; color: #888; text-align: left; margin-bottom: 3px; }
        .qr-input-group { display: flex; gap: 6px; margin: 8px 0; }
        .qr-input-group input { flex: 1; padding: 8px 12px; border-radius: 8px; border: 2px solid #333; background: #222; color: #fff; font-size: 12px; font-family: monospace; }
        .qr-input-group input:focus { border-color: #ff3333; outline: none; }
        .qr-input-group button { background: #27ae60; border: none; color: white; padding: 8px 16px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; }
        .qr-close-btn {
            background: #ff3333;
            border: none;
            color: #0a0000;
            padding: 10px 30px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            width: 100%;
            font-family: 'Courier New', monospace;
        }
        .qr-close-btn:active { transform: scale(0.95); }
        .qr-help { font-size: 12px; color: #999; margin-top: 6px; padding: 8px; background: #222; border-radius: 8px; border-left: 3px solid #f39c12; text-align: left; }

        @media (max-width: 600px) {
            .danger-header { font-size: 26px; }
            .timer-container { font-size: 56px; }
            .game-wrapper { padding: 20px 15px; }
            .title { font-size: 22px; }
        }
        @media (max-width: 400px) {
            .timer-container { font-size: 44px; }
            .input-row input { font-size: 18px; padding: 12px; }
            .input-row button { font-size: 16px; padding: 12px 20px; }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="header">
        <div class="title">⛔ SYS_CRIT</div>
        <button class="qr-btn" id="qrBtn">📱 QR-код</button>
    </div>

    <div class="danger-header">⚠️ ОПАСНОСТЬ УНИЧТОЖЕНИЯ СИСТЕМЫ!!!</div>

    <div class="timer-container">
        <span class="label">ВРЕМЯ ДО КАТАСТРОФЫ</span>
        <span class="seconds" id="timerDisplay">60</span>
    </div>

    <div class="input-area">
        <label>🔐 ВВЕДИТЕ КОД ДОСТУПА</label>
        <div class="input-row">
            <input type="password" id="codeInput" placeholder="*******" maxlength="7" inputmode="numeric" pattern="[0-9]*">
            <button id="checkBtn">Активировать</button>
        </div>
    </div>

    <div class="message-box" id="messageBox">
        <span id="messageText">Введите код и спасите систему!</span>
    </div>

    <div style="display: flex; justify-content: center; margin-top: 15px;">
        <button class="restart-btn" id="restartBtn">⟳ Перезапустить</button>
    </div>
</div>

<!-- QR modal -->
<div class="qr-modal" id="qrModal">
    <div class="qr-modal-content">
        <h2>📱 QR-код</h2>
        <p class="subtitle">Отсканируйте для перехода на игру</p>
        <div id="qrcode"></div>
        <div class="qr-url-label">🔗 Ссылка:</div>
        <div class="qr-url-box" id="qrUrl">Загрузка...</div>
        <div class="qr-input-group">
            <input type="text" id="qrUrlInput" placeholder="Вставьте ссылку...">
            <button id="qrUpdateBtn">Обновить</button>
        </div>
        <div class="qr-help">💡 Загрузите на хостинг и вставьте ссылку</div>
        <button class="qr-close-btn" id="qrCloseBtn">✕ Закрыть</button>
    </div>
</div>

<script>
(function() {
    // ====== ЭЛЕМЕНТЫ ======
    const timerDisplay = document.getElementById('timerDisplay');
    const codeInput = document.getElementById('codeInput');
    const checkBtn = document.getElementById('checkBtn');
    const messageText = document.getElementById('messageText');
    const messageBox = document.getElementById('messageBox');
    const restartBtn = document.getElementById('restartBtn');
    const qrBtn = document.getElementById('qrBtn');
    const qrModal = document.getElementById('qrModal');
    const qrCloseBtn = document.getElementById('qrCloseBtn');
    const qrUrl = document.getElementById('qrUrl');
    const qrUrlInput = document.getElementById('qrUrlInput');
    const qrUpdateBtn = document.getElementById('qrUpdateBtn');
    const qrcodeContainer = document.getElementById('qrcode');

    // ====== ПЕРЕМЕННЫЕ ======
    let timeLeft = 60;
    let timerInterval = null;
    let gameActive = true;
    let gameWon = false;
    const CORRECT_CODE = '6318527';

    // ====== ФУНКЦИИ ======
    function updateTimerDisplay() {
        timerDisplay.textContent = timeLeft;
        if (timeLeft <= 10) {
            timerDisplay.style.color = '#ff0000';
            timerDisplay.style.textShadow = '0 0 60px rgba(255,0,0,0.8)';
        } else {
            timerDisplay.style.color = '#ff4444';
            timerDisplay.style.textShadow = '0 0 40px rgba(255,0,0,0.5)';
        }
    }

    function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(function() {
            timeLeft--;
            updateTimerDisplay();
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                timerInterval = null;
                gameActive = false;
                messageBox.className = 'message-box fail';
                messageText.textContent = '💀 СИСТЕМА УНИЧТОЖЕНА! Попробуйте снова.';
                checkBtn.disabled = true;
                codeInput.disabled = true;
            }
        }, 1000);
    }

    function resetGame() {
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
        timeLeft = 60;
        gameActive = true;
        gameWon = false;
        updateTimerDisplay();
        messageBox.className = 'message-box';
        messageText.textContent = 'Введите код и спасите систему!';
        checkBtn.disabled = false;
        codeInput.disabled = false;
        codeInput.value = '';
        codeInput.focus();
        // Сброс стиля таймера
        timerDisplay.style.color = '#ff4444';
        timerDisplay.style.textShadow = '0 0 40px rgba(255,0,0,0.5)';
        startTimer();
    }

    function checkCode() {
        if (!gameActive || gameWon) return;
        const entered = codeInput.value.trim();
        if (entered === CORRECT_CODE) {
            // Победа!
            gameWon = true;
            gameActive = false;
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            messageBox.className = 'message-box success';
            messageText.textContent = '✅ Вирус обезврежен, данные сохранены!';
            checkBtn.disabled = true;
            codeInput.disabled = true;
            // Анимируем таймер (показываем оставшееся время как финальное)
        } else {
            // Неправильный код
            messageBox.className = 'message-box fail';
            messageText.textContent = '❌ НЕВЕРНЫЙ КОД! Попробуйте снова.';
            codeInput.value = '';
            codeInput.focus();
            // Возвращаем класс через 1.5 секунды, но оставляем сообщение об ошибке
            setTimeout(() => {
                if (!gameWon && gameActive) {
                    messageBox.className = 'message-box';
                    messageText.textContent = 'Введите код и спасите систему!';
                }
            }, 1500);
        }
    }

    // ====== ОБРАБОТЧИКИ ======
    checkBtn.addEventListener('click', checkCode);
    codeInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            checkCode();
        }
        // Ограничиваем длину
        if (this.value.length >= 7 && e.key !== 'Backspace' && e.key !== 'Delete' && !e.ctrlKey && !e.metaKey) {
            e.preventDefault();
        }
    });

    restartBtn.addEventListener('click', function() {
        resetGame();
    });

    // ====== QR ======
    function generateQR(text) {
        qrcodeContainer.innerHTML = '';
        if (text && text.trim() !== '') {
            try {
                new QRCode(qrcodeContainer, {
                    text: text,
                    width: 200,
                    height: 200,
                    colorDark: '#000000',
                    colorLight: '#ffffff',
                    correctLevel: QRCode.CorrectLevel.H
                });
                return true;
            } catch(e) { return false; }
        }
        return false;
    }

    function getCurrentUrl() {
        let url = window.location.href;
        if (url.startsWith('file://')) return '';
        return url;
    }

    qrBtn.addEventListener('click', function() {
        qrModal.classList.add('active');
        let currentUrl = getCurrentUrl();
        if (currentUrl) {
            qrUrl.textContent = currentUrl;
            qrUrlInput.value = currentUrl;
            generateQR(currentUrl);
        } else {
            qrUrl.textContent = '⚠️ Загрузите на хостинг!';
            qrUrlInput.value = '';
            qrcodeContainer.innerHTML = '<div style="padding:20px;color:#999;">Введите ссылку</div>';
        }
    });

    qrCloseBtn.addEventListener('click', function() { qrModal.classList.remove('active'); });
    qrModal.addEventListener('click', function(e) { if (e.target === qrModal) qrModal.classList.remove('active'); });
    qrUpdateBtn.addEventListener('click', function() {
        let url = qrUrlInput.value.trim();
        if (url) {
            qrUrl.textContent = url;
            if (!generateQR(url)) alert('Не удалось создать QR-код');
        } else {
            alert('Введите ссылку');
        }
    });
    qrUrlInput.addEventListener('keypress', function(e) { if (e.key === 'Enter') qrUpdateBtn.click(); });

    // ====== СТАРТ ======
    resetGame();
})();
</script>
</body>
</html>
